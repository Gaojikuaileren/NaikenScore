<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>房源评分</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f4f2ec; --card:#fffefb; --ink:#20201d; --ink-soft:#6f6c64;
    --line:rgba(32,32,29,.10); --line-strong:rgba(32,32,29,.18);
    --chip:#ece9e1; --chip-text:#45433d;
    --sel-bg:var(--ink); --sel-text:#f7f5f0;
    --accent:#2f6f4f; --track:#e4e0d6;
    --good:#2f6f4f; --good-bg:#e4eee7;
    --ok:#2d5d86; --ok-bg:#e3ecf3;
    --mid:#8a5a16; --mid-bg:#f3e9d8;
    --bad:#9a3b32; --bad-bg:#f2e2df;
    --font-ui:'Hanken Grotesk',-apple-system,BlinkMacSystemFont,'PingFang SC','Hiragino Sans','Microsoft YaHei',sans-serif;
    --font-num:'Fraunces',Georgia,'PingFang SC','Hiragino Mincho ProN',serif;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --paper:#131311; --card:#1c1c19; --ink:#f0eee8; --ink-soft:#9a978e;
      --line:rgba(240,238,232,.12); --line-strong:rgba(240,238,232,.22);
      --chip:#2a2a26; --chip-text:#cfccc3;
      --sel-bg:#f0eee8; --sel-text:#1a1a17;
      --accent:#6cc2a0; --track:#34332e;
      --good:#7fcaa6; --good-bg:#1c3329;
      --ok:#82b2dc; --ok-bg:#16293a;
      --mid:#d4a866; --mid-bg:#332817;
      --bad:#dd9089; --bad-bg:#33201e;
    }
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;touch-action:manipulation;}
  body{
    background:var(--paper); color:var(--ink); font-family:var(--font-ui);
    font-size:16px; line-height:1.5; -webkit-font-smoothing:antialiased;
    padding-bottom:calc(40px + env(safe-area-inset-bottom));
  }
  .app{max-width:460px;margin:0 auto;}

  /* ---------- sticky header ---------- */
  header{position:sticky; top:0; z-index:20; background:var(--paper); padding:calc(env(safe-area-inset-top) + 14px) 16px 12px; border-bottom:1px solid var(--line);}
  .bar{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px;}
  .bar h1{font-family:var(--font-num);font-weight:500;font-size:19px;letter-spacing:.2px;margin:0;white-space:nowrap;}
  .tools{display:flex;gap:7px;align-items:center;}
  .lang-seg{display:flex;border:1px solid var(--line-strong);border-radius:11px;overflow:hidden;}
  .lang-seg button{width:34px;height:38px;border:none;background:var(--card);color:var(--ink-soft);font-family:var(--font-ui);font-size:14px;font-weight:600;cursor:pointer;transition:background .12s,color .12s;}
  .lang-seg button + button{border-left:1px solid var(--line);}
  .lang-seg button.on{background:var(--sel-bg);color:var(--sel-text);}
  .icon-btn{width:38px;height:38px;border-radius:11px;border:1px solid var(--line-strong);background:var(--card);color:var(--ink);font-size:17px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .12s,background .12s;}
  .icon-btn:active{transform:scale(.92);background:var(--chip);}
  .score-line{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;}
  .score-main{display:flex;align-items:baseline;gap:6px;}
  .score-num{font-family:var(--font-num);font-weight:600;font-size:46px;line-height:.95;letter-spacing:-.5px;}
  .score-max{font-size:15px;color:var(--ink-soft);}
  .verdict{font-size:13px;font-weight:600;padding:6px 13px;border-radius:999px;white-space:nowrap;}
  .v-good{color:var(--good);background:var(--good-bg);}
  .v-ok{color:var(--ok);background:var(--ok-bg);}
  .v-mid{color:var(--mid);background:var(--mid-bg);}
  .v-bad{color:var(--bad);background:var(--bad-bg);}
  .progress{height:5px;border-radius:999px;background:var(--track);margin-top:12px;overflow:hidden;}
  .progress > div{height:100%;border-radius:999px;background:var(--ink);transition:width .35s ease,background .35s;}

  /* ---------- items ---------- */
  main{padding:16px 14px 0;}
  .group-label{font-size:12px;font-weight:600;letter-spacing:.6px;color:var(--ink-soft);text-transform:uppercase;margin:18px 6px 8px;}
  .group-label:first-child{margin-top:2px;}
  .item{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px 16px;margin-bottom:10px;}
  .item-head{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .item-ic{font-size:18px;color:var(--ink-soft);width:20px;text-align:center;}
  .item-name{font-size:15px;font-weight:500;flex:1;}
  .item-val{font-family:var(--font-num);font-weight:500;font-size:15px;color:var(--ink-soft);}
  .seg{display:flex;gap:7px;flex-wrap:wrap;}
  .seg button{flex:1 1 auto;min-width:0;min-height:40px;padding:8px 6px;border-radius:11px;border:1px solid var(--line-strong);background:var(--chip);color:var(--chip-text);font-family:var(--font-ui);font-size:13.5px;font-weight:500;cursor:pointer;transition:background .14s,color .14s,border-color .14s,transform .1s;}
  .seg button:active{transform:scale(.96);}
  .seg button.on{background:var(--sel-bg);color:var(--sel-text);border-color:var(--sel-bg);}
  .slider-row{display:flex;align-items:center;gap:14px;}
  input[type=range]{-webkit-appearance:none;appearance:none;flex:1;height:5px;border-radius:999px;background:var(--track);outline:none;margin:8px 0;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:24px;height:24px;border-radius:50%;background:var(--ink);cursor:pointer;border:3px solid var(--card);box-shadow:0 1px 4px rgba(0,0,0,.22);}
  input[type=range]::-moz-range-thumb{width:24px;height:24px;border-radius:50%;background:var(--ink);cursor:pointer;border:3px solid var(--card);box-shadow:0 1px 4px rgba(0,0,0,.22);}
  .hint{font-size:11.5px;color:var(--ink-soft);margin-top:6px;}

  /* ---------- settings modal ---------- */
  .overlay{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.45);display:none;align-items:flex-end;}
  .overlay.show{display:flex;}
  .sheet{width:100%;max-width:460px;margin:0 auto;background:var(--paper);border-radius:22px 22px 0 0;max-height:90vh;display:flex;flex-direction:column;animation:rise .26s ease;}
  @keyframes rise{from{transform:translateY(100%);}to{transform:translateY(0);}}
  .sheet-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 14px;border-bottom:1px solid var(--line);}
  .sheet-head h2{font-family:var(--font-num);font-weight:500;font-size:18px;margin:0;}
  .sheet-head p{font-size:12px;color:var(--ink-soft);margin:3px 0 0;}
  .done-btn{border:none;background:var(--ink);color:var(--sel-text);font-family:var(--font-ui);font-size:14px;font-weight:600;padding:8px 18px;border-radius:11px;cursor:pointer;}
  .done-btn:active{transform:scale(.96);}
  .sheet-body{overflow-y:auto;padding:8px 20px 4px;flex:1;-webkit-overflow-scrolling:touch;}
  .sec-label{font-size:12px;font-weight:600;letter-spacing:.5px;color:var(--ink-soft);text-transform:uppercase;margin:14px 0 2px;}
  .thresh-note{font-size:11.5px;color:var(--ink-soft);margin:2px 0 4px;}
  .wrow{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 0;border-bottom:1px solid var(--line);}
  .wrow:last-child{border-bottom:none;}
  .wrow .wn{font-size:14.5px;}
  .wrow .wn small{display:block;color:var(--ink-soft);font-size:11.5px;margin-top:2px;}
  .thr-side{display:flex;align-items:center;gap:8px;}
  .thr-ge{color:var(--ink-soft);font-size:14px;}
  .stepper{display:flex;align-items:center;border:1px solid var(--line-strong);border-radius:11px;overflow:hidden;}
  .stepper button{width:38px;height:38px;border:none;background:var(--card);color:var(--ink);font-size:20px;cursor:pointer;font-family:var(--font-ui);}
  .stepper button:active{background:var(--chip);}
  .stepper input{width:50px;height:38px;border:none;border-left:1px solid var(--line);border-right:1px solid var(--line);text-align:center;background:var(--card);color:var(--ink);font-family:var(--font-num);font-weight:500;font-size:15px;}
  .stepper input:focus{outline:none;}
  .sheet-foot{padding:14px 20px calc(16px + env(safe-area-inset-bottom));border-top:1px solid var(--line);}
  .reset-weights{width:100%;padding:13px;border-radius:13px;border:1px solid var(--line-strong);background:transparent;color:var(--ink-soft);font-family:var(--font-ui);font-size:14px;font-weight:500;cursor:pointer;}
  .reset-weights:active{background:var(--chip);}
  .total-line{text-align:center;font-size:12.5px;color:var(--ink-soft);margin-bottom:12px;}
  .total-line b{color:var(--ink);font-family:var(--font-num);}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="bar">
      <h1 id="title">房源评分</h1>
      <div class="tools">
        <div class="lang-seg">
          <button id="langZh">中</button>
          <button id="langJa">日</button>
        </div>
        <button class="icon-btn" id="copyBtn" aria-label="copy"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"></rect><path d="M5 15V5a2 2 0 0 1 2-2h10"></path></svg></button>
        <button class="icon-btn" id="resetBtn" aria-label="reset">&#8635;</button>
        <button class="icon-btn" id="settingsBtn" aria-label="settings">&#9881;</button>
      </div>
    </div>
    <div class="score-line">
      <div class="score-main">
        <span class="score-num" id="scoreNum">0</span>
        <span class="score-max" id="scoreMax">/ 0</span>
      </div>
      <span class="verdict v-bad" id="verdict">—</span>
    </div>
    <div class="progress"><div id="progressFill" style="width:0%"></div></div>
  </header>

  <main id="items">
    <div style="padding:26px 10px;color:var(--ink-soft);font-size:13.5px;line-height:1.75;">
      正在加载… 若此处持续空白，说明当前预览未运行脚本。请将文件保存后用 Safari 等浏览器打开。<br>
      読み込み中… ここが空白のままなら、スクリプトが動作していません。ファイルを保存して Safari などのブラウザで開いてください。
    </div>
  </main>
</div>

<!-- 设置面板 / 設定パネル -->
<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="sheet-head">
      <div>
        <h2 id="sheetTitle">设置</h2>
        <p id="sheetSub">修改后自动保存</p>
      </div>
      <button class="done-btn" id="doneBtn">完成</button>
    </div>
    <div class="sheet-body">
      <div class="sec-label" id="secWeightsLabel">权重</div>
      <div id="weightList"></div>
      <div class="sec-label" id="secThreshLabel">评判阈值</div>
      <div class="thresh-note" id="threshNote"></div>
      <div id="threshList"></div>
    </div>
    <div class="sheet-foot">
      <div class="total-line"><span id="wsPre">当前满分合计</span> <b id="weightSum">0</b> <span id="wsSuf">分</span></div>
      <button class="reset-weights" id="resetAllBtn">恢复默认设置</button>
    </div>
  </div>
</div>

<script>
/* =========================================================================
   配置区 / 設定エリア
   添加新评分项：在 CONFIG 里加一个对象即可，界面自动生成。
   所有文案均为 {zh:'中文', ja:'日本語'} 双语对象。

   字段：id 唯一key / label 名称 / icon 图标 / group 分组id / weight 满分 / default 默认状态
   类型 type：
     'segment' 按钮项 options:[{label,factor}]  得分=factor×weight (factor 可负)
     'direct'  直接打分滑块 0~weight，得分=滑块值  (step/default/unit/hint)
     'smooth'  平滑映射滑块 真实数值→0~weight  (min/max/lowBound/highBound/step/unit/default; inverted=越小越好)
   ========================================================================= */

const GROUPS = {
  comfort:  {zh:'生活舒适度', ja:'暮らしの快適さ'},
  space:    {zh:'工作与空间', ja:'仕事とスペース'},
  location: {zh:'位置与环境', ja:'立地と環境'},
  cost:     {zh:'经济与条件', ja:'費用と条件'},
  subj:     {zh:'主观',       ja:'主観'},
};

const CONFIG = [
  { id:'balcony', label:{zh:'阳台',ja:'バルコニー'}, icon:'☀', group:'comfort', type:'segment', weight:2, default:0,
    options:[{label:{zh:'无阳台',ja:'なし'},factor:0},{label:{zh:'小阳台',ja:'小さい'},factor:0.5},{label:{zh:'好阳台',ja:'広い'},factor:1}] },
  { id:'bathtub', label:{zh:'浴缸',ja:'バスタブ'}, icon:'◗', group:'comfort', type:'segment', weight:1, default:0,
    options:[{label:{zh:'无',ja:'なし'},factor:0},{label:{zh:'有',ja:'あり'},factor:1}] },
  { id:'kitchen', label:{zh:'厨房',ja:'キッチン'}, icon:'▤', group:'comfort', type:'segment', weight:2, default:0,
    options:[{label:{zh:'无',ja:'なし'},factor:0},{label:{zh:'简易',ja:'簡易'},factor:0.5},{label:{zh:'完整',ja:'充実'},factor:1}] },
  { id:'guest_wc', label:{zh:'客人洗手间',ja:'来客用トイレ'}, icon:'◔', group:'comfort', type:'segment', weight:1, default:0,
    options:[{label:{zh:'无',ja:'なし'},factor:0},{label:{zh:'有',ja:'あり'},factor:1}] },

  { id:'workspace', label:{zh:'工作空间',ja:'ワークスペース'}, icon:'▦', group:'space', type:'direct', weight:4, step:1, default:0,
    hint:{zh:'0 无 · 1–3 卧室/客厅办公 · 4 独立书房', ja:'0 なし · 1–3 寝室/リビング作業 · 4 書斎'} },
  { id:'area', label:{zh:'面积',ja:'広さ'}, icon:'⬚', group:'space', type:'smooth', weight:4,
    min:30, max:100, lowBound:50, highBound:77, step:1, unit:'㎡', default:50 },
  { id:'floor', label:{zh:'楼层',ja:'階数'}, icon:'⌂', group:'space', type:'segment', weight:2, default:1,
    options:[{label:{zh:'0–1楼',ja:'0〜1階'},factor:1},{label:{zh:'其他',ja:'その他'},factor:0},{label:{zh:'顶楼',ja:'最上階'},factor:-0.5}] },

  { id:'parking', label:{zh:'停车场',ja:'駐車場'}, icon:'⊟', group:'location', type:'segment', weight:1, default:0,
    options:[{label:{zh:'无',ja:'なし'},factor:0},{label:{zh:'有',ja:'あり'},factor:1}] },
  { id:'commute', label:{zh:'通勤时间',ja:'通勤時間'}, icon:'➤', group:'location', type:'segment', weight:3, default:3,
    options:[{label:{zh:'≤10分',ja:'10分以内'},factor:1},{label:{zh:'≤13分',ja:'13分以内'},factor:0.667},{label:{zh:'≤15分',ja:'15分以内'},factor:0.333},{label:{zh:'>15分',ja:'15分超'},factor:0}] },
  { id:'env', label:{zh:'环境',ja:'環境'}, icon:'❡', group:'location', type:'direct', weight:3, step:0.5, default:0,
    hint:{zh:'0 差 — 满分 好', ja:'0 悪い — 満点 良い'} },

  { id:'rent', label:{zh:'月租金',ja:'月額家賃'}, icon:'€', group:'cost', type:'smooth', weight:3,
    min:600, max:1300, lowBound:800, highBound:1100, inverted:true, step:10, unit:'€', default:1100 },
  { id:'reno', label:{zh:'装修状况',ja:'内装の状態'}, icon:'✎', group:'cost', type:'direct', weight:2, step:0.5, default:0,
    hint:{zh:'0 旧 — 满分 新', ja:'0 古い — 満点 新しい'} },
  { id:'landlord', label:{zh:'房东 / 机构',ja:'大家 / 管理会社'}, icon:'☻', group:'cost', type:'segment', weight:1, default:2,
    options:[{label:{zh:'很差',ja:'悪い'},factor:-2},{label:{zh:'一般',ja:'ふつう'},factor:-1},{label:{zh:'未知',ja:'不明'},factor:0},{label:{zh:'好人',ja:'良い'},factor:1}] },

  { id:'subjective', label:{zh:'主观感受',ja:'直感評価'}, icon:'♥', group:'subj', type:'direct', weight:5, step:0.5, default:0,
    hint:{zh:'凭直觉打分 · 0 无感 — 满分 一见钟情', ja:'直感で · 0 無感 — 満点 ひとめ惚れ'} },
];

// 评判阈值默认值（绝对分数）。强烈推荐 ≥ good，值得考虑 ≥ ok，一般 ≥ mid，低于 mid 为不推荐
const DEFAULT_THRESHOLDS = { good:7.0, ok:5.5, mid:3.5 }; // 10 分制（强烈推荐 / 值得考虑 / 一般）

const UI = {
  title:        {zh:'房源评分', ja:'物件スコア'},
  verdictGood:  {zh:'强烈推荐看房', ja:'ぜひ内見を'},
  verdictOk:    {zh:'值得考虑', ja:'検討の価値あり'},
  verdictMid:   {zh:'一般', ja:'まあまあ'},
  verdictBad:   {zh:'不推荐', ja:'おすすめしない'},
  settingsTitle:{zh:'设置', ja:'設定'},
  resetTip:     {zh:'重置本次输入', ja:'今回の入力をリセット'},
  copyTip:      {zh:'复制评估', ja:'評価をコピー'},
  settingsTip:  {zh:'设置', ja:'設定'},
  sheetSub:     {zh:'修改后自动保存', ja:'変更は自動保存'},
  done:         {zh:'完成', ja:'完了'},
  secWeights:   {zh:'权重（每项满分）', ja:'重み（各項目の満点）'},
  secThresh:    {zh:'评判阈值', ja:'判定しきい値'},
  threshNote:   {zh:'10 分制 · 分数达到该线即归入对应评价', ja:'10点満点 · スコアがこの値以上で各評価に'},
  wsPre:        {zh:'当前满分合计', ja:'現在の満点合計'},
  wsSuf:        {zh:'分', ja:'点'},
  resetAll:     {zh:'恢复默认设置', ja:'設定を初期化'},
  confirmReset: {zh:'清空本次所有评分？（权重和阈值会保留）', ja:'今回のスコアをすべてクリアしますか？（重みとしきい値は保持）'},
  confirmResetAll:{zh:'恢复所有权重和阈值为默认值？', ja:'すべての重みとしきい値を初期値に戻しますか？'},
};

/* ===================== 逻辑 / ロジック ===================== */

const LS_WEIGHTS = 'houseScoreWeights_v1';
const LS_THRESH  = 'houseScoreThresholds_v2';
const LS_LANG    = 'houseScoreLang_v1';

const round1 = n => Math.round(n*10)/10;
const clamp = (n,a,b)=>Math.max(a,Math.min(b,n));

// 语言
let lang = 'zh';
try{ const sl = localStorage.getItem(LS_LANG); if(sl==='zh'||sl==='ja') lang = sl; }catch(e){}
function L(field){ if(field==null) return ''; if(typeof field==='string') return field; return field[lang] || field.zh || ''; }

// 权重
function defaultWeights(){ const w={}; CONFIG.forEach(i=>w[i.id]=i.weight); return w; }
let weights = defaultWeights();
try{
  const saved = JSON.parse(localStorage.getItem(LS_WEIGHTS) || '{}');
  CONFIG.forEach(i=>{ if(typeof saved[i.id]==='number') weights[i.id]=saved[i.id]; });
}catch(e){}
function persistWeights(){ try{ localStorage.setItem(LS_WEIGHTS, JSON.stringify(weights)); }catch(e){} }

// 阈值
let thresholds = {...DEFAULT_THRESHOLDS};
try{
  const s = JSON.parse(localStorage.getItem(LS_THRESH) || '{}');
  ['good','ok','mid'].forEach(k=>{ if(typeof s[k]==='number') thresholds[k]=s[k]; });
}catch(e){}
// 保证 good ≥ ok ≥ mid，且均在 0–10（10 分制）
function normalizeThresholds(){
  const r=v=>clamp(Math.round(v*2)/2,0,10);
  thresholds.mid = r(thresholds.mid);
  thresholds.ok  = Math.max(thresholds.mid, r(thresholds.ok));
  thresholds.good= Math.max(thresholds.ok, r(thresholds.good));
}
normalizeThresholds();
function persistThresholds(){ try{ localStorage.setItem(LS_THRESH, JSON.stringify(thresholds)); }catch(e){} }

// 本次输入状态（不持久化）
function defaultState(){ const s={}; CONFIG.forEach(i=>s[i.id]=i.default); return s; }
let state = defaultState();

function itemScore(it){
  const w = weights[it.id], v = state[it.id];
  if(it.type==='segment') return it.options[v].factor * w;
  if(it.type==='direct')  return clamp(v,0,w);
  if(it.type==='smooth'){
    let f = it.inverted ? (it.highBound - v)/(it.highBound - it.lowBound)
                        : (v - it.lowBound)/(it.highBound - it.lowBound);
    return clamp(f,0,1) * w;
  }
  return 0;
}
function itemMax(it){
  const w = weights[it.id];
  if(it.type==='segment') return Math.max(...it.options.map(o=>o.factor)) * w;
  return w;
}
function totalMax(){ return CONFIG.reduce((s,it)=>s+itemMax(it),0); }
function total(){ return CONFIG.reduce((s,it)=>s+itemScore(it),0); }

function displayVal(it){
  const v = state[it.id];
  if(it.type==='direct') return round1(v) + (it.unit?(' '+it.unit):'');
  if(it.type==='smooth') return v + (it.unit?(' '+it.unit):'');
  return '';
}

/* ---------- 渲染主体 ---------- */
const itemsEl = document.getElementById('items');
function renderBody(){
  itemsEl.innerHTML = '';
  let lastGroup = null;
  CONFIG.forEach(it=>{
    if(it.group !== lastGroup){
      const g = document.createElement('div');
      g.className = 'group-label';
      g.textContent = L(GROUPS[it.group]);
      itemsEl.appendChild(g);
      lastGroup = it.group;
    }
    const card = document.createElement('div');
    card.className = 'item';

    const head = document.createElement('div');
    head.className = 'item-head';
    head.innerHTML = `<span class="item-ic">${it.icon||''}</span><span class="item-name"></span>`;
    head.querySelector('.item-name').textContent = L(it.label);
    const valSpan = document.createElement('span');
    valSpan.className = 'item-val';
    valSpan.id = `val-${it.id}`;
    if(it.type!=='segment') valSpan.textContent = displayVal(it);
    head.appendChild(valSpan);
    card.appendChild(head);

    if(it.type==='segment'){
      const seg = document.createElement('div');
      seg.className = 'seg';
      it.options.forEach((o,idx)=>{
        const b = document.createElement('button');
        b.textContent = L(o.label);
        if(state[it.id]===idx) b.classList.add('on');
        b.onclick = ()=>{
          state[it.id]=idx;
          seg.querySelectorAll('button').forEach(x=>x.classList.remove('on'));
          b.classList.add('on');
          updateTotal();
        };
        seg.appendChild(b);
      });
      card.appendChild(seg);
    } else {
      const row = document.createElement('div');
      row.className = 'slider-row';
      const range = document.createElement('input');
      range.type = 'range';
      if(it.type==='direct'){ range.min=0; range.max=weights[it.id]; range.step=it.step; }
      else { range.min=it.min; range.max=it.max; range.step=it.step; }
      range.value = state[it.id];
      range.oninput = ()=>{
        state[it.id] = parseFloat(range.value);
        document.getElementById(`val-${it.id}`).textContent = displayVal(it);
        updateTotal();
      };
      row.appendChild(range);
      card.appendChild(row);
      if(it.hint){
        const h = document.createElement('div');
        h.className='hint'; h.textContent=L(it.hint);
        card.appendChild(h);
      }
    }
    itemsEl.appendChild(card);
  });
}

/* ---------- 顶部总分 ---------- */
const scoreNumEl = document.getElementById('scoreNum');
const scoreMaxEl = document.getElementById('scoreMax');
const verdictEl  = document.getElementById('verdict');
const progressEl = document.getElementById('progressFill');

function updateTotal(){
  const t = total(), m = totalMax();
  const pct = m>0 ? clamp(t,0,m)/m*100 : 0;
  const score10 = pct/10;               // 占满分百分比 ÷ 10 → 10 分制
  scoreNumEl.textContent = score10.toFixed(1);
  scoreMaxEl.textContent = '/ 10';
  progressEl.style.width = pct + '%';

  let cls,label;
  if(score10>=thresholds.good){ cls='v-good'; label=L(UI.verdictGood); }
  else if(score10>=thresholds.ok){ cls='v-ok'; label=L(UI.verdictOk); }
  else if(score10>=thresholds.mid){ cls='v-mid'; label=L(UI.verdictMid); }
  else { cls='v-bad'; label=L(UI.verdictBad); }
  verdictEl.className = 'verdict ' + cls;
  verdictEl.textContent = label;
  const key = (cls==='v-good')?'--good':(cls==='v-ok')?'--ok':(cls==='v-mid')?'--mid':'--bad';
  progressEl.style.background = getComputedStyle(document.documentElement).getPropertyValue(key).trim() || 'var(--ink)';
}

/* ---------- 重置本次输入 ---------- */
document.getElementById('resetBtn').onclick = ()=>{
  if(confirm(L(UI.confirmReset))){
    state = defaultState();
    renderBody(); updateTotal();
    window.scrollTo({top:0,behavior:'smooth'});
  }
};

/* ---------- 复制评估描述 / 評価をコピー ---------- */
const copyBtn = document.getElementById('copyBtn');
const COPY_ICON = copyBtn.innerHTML;
const CHECK_ICON = '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';

function describeValue(it){
  const v = state[it.id];
  if(it.type==='segment') return L(it.options[v].label);
  if(it.type==='smooth')  return v + (it.unit?(' '+it.unit):'');
  if(it.type==='direct')  return round1(v) + ' / ' + round1(weights[it.id]);
  return '';
}
function buildDescription(){
  const t = total(), m = totalMax();
  const score10 = m>0 ? clamp(t,0,m)/m*10 : 0;
  let verdict;
  if(score10>=thresholds.good) verdict=L(UI.verdictGood);
  else if(score10>=thresholds.ok) verdict=L(UI.verdictOk);
  else if(score10>=thresholds.mid) verdict=L(UI.verdictMid);
  else verdict=L(UI.verdictBad);
  const lines = [ L(UI.title)+' '+score10.toFixed(1)+'/10 · '+verdict, '' ];
  let lastGroup=null;
  CONFIG.forEach(it=>{
    if(it.group!==lastGroup){ lines.push('【'+L(GROUPS[it.group])+'】'); lastGroup=it.group; }
    lines.push('· '+L(it.label)+'：'+describeValue(it));
  });
  return lines.join('\n');
}
function flashCopied(){
  copyBtn.innerHTML = CHECK_ICON;
  setTimeout(()=>{ copyBtn.innerHTML = COPY_ICON; }, 1200);
}
async function doCopy(){
  const text = buildDescription();
  try{
    if(navigator.clipboard && navigator.clipboard.writeText){ await navigator.clipboard.writeText(text); }
    else { throw 0; }
    flashCopied();
  }catch(e){
    try{
      const ta=document.createElement('textarea');
      ta.value=text; ta.style.position='fixed'; ta.style.top='0'; ta.style.opacity='0';
      document.body.appendChild(ta); ta.focus(); ta.select();
      ta.setSelectionRange(0, text.length);
      document.execCommand('copy');
      document.body.removeChild(ta);
      flashCopied();
    }catch(e2){ alert(text); }
  }
}
copyBtn.onclick = doCopy;

/* ---------- 设置面板 ---------- */
const overlay = document.getElementById('overlay');
const weightList = document.getElementById('weightList');
const threshList = document.getElementById('threshList');
const weightSumEl = document.getElementById('weightSum');
const threshNoteEl = document.getElementById('threshNote');

function setMaxUI(){
  weightSumEl.textContent = round1(totalMax());
}

function makeStepper(getVal, onApply, isInt){
  const stepper = document.createElement('div'); stepper.className='stepper';
  const minus = document.createElement('button'); minus.textContent='–';
  const inp = document.createElement('input'); inp.type='text'; inp.inputMode='decimal'; inp.value=round1(getVal());
  const plus = document.createElement('button'); plus.textContent='+';
  const step = isInt?1:0.5;
  const commit = v=>{ onApply(v); inp.value=round1(getVal()); };
  minus.onclick=()=>commit(getVal()-step);
  plus.onclick =()=>commit(getVal()+step);
  inp.onchange =()=>{ const n=parseFloat(inp.value); commit(isNaN(n)?0:n); };
  stepper.appendChild(minus); stepper.appendChild(inp); stepper.appendChild(plus);
  return stepper;
}

function renderWeights(){
  weightList.innerHTML = '';
  CONFIG.forEach(it=>{
    const row = document.createElement('div'); row.className='wrow';
    const wn = document.createElement('div'); wn.className='wn';
    wn.innerHTML = `<span></span><small></small>`;
    wn.querySelector('span').textContent = L(it.label);
    wn.querySelector('small').textContent = L(GROUPS[it.group]);
    row.appendChild(wn);
    const stepper = makeStepper(
      ()=>weights[it.id],
      v=>{ weights[it.id]=Math.max(0, Math.round(v*2)/2); persistWeights(); setMaxUI(); updateTotal(); },
      false
    );
    row.appendChild(stepper);
    weightList.appendChild(row);
  });
}

function renderThresholds(){
  threshList.innerHTML='';
  const defs = [
    {key:'good', label:UI.verdictGood},
    {key:'ok',   label:UI.verdictOk},
    {key:'mid',  label:UI.verdictMid},
  ];
  defs.forEach(d=>{
    const row=document.createElement('div'); row.className='wrow';
    const wn=document.createElement('div'); wn.className='wn'; wn.textContent=L(d.label);
    row.appendChild(wn);
    const side=document.createElement('div'); side.className='thr-side';
    const ge=document.createElement('span'); ge.className='thr-ge'; ge.textContent='≥';
    const stepper = makeStepper(
      ()=>thresholds[d.key],
      v=>{
        v = clamp(Math.round(v*2)/2, 0, 10);
        if(d.key==='good') thresholds.good = clamp(Math.max(v, thresholds.ok), 0, 10);
        else if(d.key==='ok') thresholds.ok = clamp(v, thresholds.mid, thresholds.good);
        else thresholds.mid = clamp(v, 0, thresholds.ok);
        persistThresholds(); updateTotal();
      },
      false
    );
    side.appendChild(ge); side.appendChild(stepper);
    row.appendChild(side);
    threshList.appendChild(row);
  });
}

function renderSettings(){ renderWeights(); renderThresholds(); setMaxUI(); }

document.getElementById('settingsBtn').onclick = ()=>{ renderSettings(); overlay.classList.add('show'); };
function closeSheet(){ overlay.classList.remove('show'); renderBody(); updateTotal(); }
document.getElementById('doneBtn').onclick = closeSheet;
overlay.onclick = e=>{ if(e.target===overlay) closeSheet(); };
document.getElementById('resetAllBtn').onclick = ()=>{
  if(confirm(L(UI.confirmResetAll))){
    weights = defaultWeights(); persistWeights();
    thresholds = {...DEFAULT_THRESHOLDS}; persistThresholds();
    renderSettings(); updateTotal();
  }
};

/* ---------- 语言切换 ---------- */
const langZh = document.getElementById('langZh');
const langJa = document.getElementById('langJa');
function applyLang(){
  document.documentElement.lang = (lang==='ja'?'ja':'zh-CN');
  document.title = L(UI.title);
  document.getElementById('title').textContent = L(UI.title);
  document.getElementById('resetBtn').title = L(UI.resetTip);
  document.getElementById('copyBtn').title = L(UI.copyTip);
  document.getElementById('settingsBtn').title = L(UI.settingsTip);
  document.getElementById('sheetTitle').textContent = L(UI.settingsTitle);
  document.getElementById('sheetSub').textContent = L(UI.sheetSub);
  document.getElementById('doneBtn').textContent = L(UI.done);
  document.getElementById('secWeightsLabel').textContent = L(UI.secWeights);
  document.getElementById('secThreshLabel').textContent = L(UI.secThresh);
  threshNoteEl.textContent = L(UI.threshNote);
  document.getElementById('wsPre').textContent = L(UI.wsPre);
  document.getElementById('wsSuf').textContent = L(UI.wsSuf);
  document.getElementById('resetAllBtn').textContent = L(UI.resetAll);
  langZh.classList.toggle('on', lang==='zh');
  langJa.classList.toggle('on', lang==='ja');
  renderBody();
  if(overlay.classList.contains('show')) renderSettings();
  else setMaxUI();
  updateTotal();
}
function setLang(l){ lang=l; try{localStorage.setItem(LS_LANG,l);}catch(e){} applyLang(); }
langZh.onclick = ()=>setLang('zh');
langJa.onclick = ()=>setLang('ja');

/* ---------- 启动 ---------- */
applyLang();
</script>
