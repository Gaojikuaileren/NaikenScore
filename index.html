<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>房源评分</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f4f2ec; --card:#fffefb; --ink:#20201d; --ink-soft:#6f6c64;
    --line:rgba(32,32,29,.10); --line-strong:rgba(32,32,29,.18);
    --chip:#ece9e1; --chip-text:#45433d;
    --sel-bg:var(--ink); --sel-text:#f7f5f0;
    --accent:#2f6f4f; --track:#e4e0d6;
    --good:#2f6f4f; --good-bg:#e4eee7;
    --ok:#2d5d86; --ok-bg:#e3ecf3;
    --mid:#8a5a16; --mid-bg:#f3e9d8;
    --bad:#9a3b32; --bad-bg:#f2e2df;
    --font-ui:'Hanken Grotesk',-apple-system,BlinkMacSystemFont,'PingFang SC','Hiragino Sans','Microsoft YaHei',sans-serif;
    --font-num:'Fraunces',Georgia,'PingFang SC','Hiragino Mincho ProN',serif;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --paper:#131311; --card:#1c1c19; --ink:#f0eee8; --ink-soft:#9a978e;
      --line:rgba(240,238,232,.12); --line-strong:rgba(240,238,232,.22);
      --chip:#2a2a26; --chip-text:#cfccc3;
      --sel-bg:#f0eee8; --sel-text:#1a1a17;
      --accent:#6cc2a0; --track:#34332e;
      --good:#7fcaa6; --good-bg:#1c3329;
      --ok:#82b2dc; --ok-bg:#16293a;
      --mid:#d4a866; --mid-bg:#332817;
      --bad:#dd9089; --bad-bg:#33201e;
    }
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;touch-action:manipulation;}
  body{
    background:var(--paper); color:var(--ink); font-family:var(--font-ui);
    font-size:16px; line-height:1.5; -webkit-font-smoothing:antialiased;
    padding-bottom:calc(40px + env(safe-area-inset-bottom));
  }
  .app{max-width:460px;margin:0 auto;}

  /* ---------- sticky header ---------- */
  header{position:sticky; top:0; z-index:20; background:var(--paper); padding:calc(env(safe-area-inset-top) + 14px) 16px 12px; border-bottom:1px solid var(--line);}
  .bar{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px;}
  .bar h1{font-family:var(--font-num);font-weight:500;font-size:19px;letter-spacing:.2px;margin:0;white-space:nowrap;min-width:0;overflow:hidden;text-overflow:ellipsis;}
  .tools{display:flex;gap:6px;align-items:center;flex-shrink:0;}
  .lang-seg{display:flex;border:1px solid var(--line-strong);border-radius:11px;overflow:hidden;}
  .lang-seg button{width:30px;height:36px;border:none;background:var(--card);color:var(--ink-soft);font-family:var(--font-ui);font-size:13.5px;font-weight:600;cursor:pointer;transition:background .12s,color .12s;}
  .lang-seg button + button{border-left:1px solid var(--line);}
  .lang-seg button.on{background:var(--sel-bg);color:var(--sel-text);}
  .icon-btn{width:36px;height:36px;border-radius:11px;border:1px solid var(--line-strong);background:var(--card);color:var(--ink);font-size:17px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .12s,background .12s;}
  .icon-btn:active{transform:scale(.92);background:var(--chip);}
  .score-line{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;}
  .score-main{display:flex;align-items:baseline;gap:6px;}
  .score-num{font-family:var(--font-num);font-weight:600;font-size:46px;line-height:.95;letter-spacing:-.5px;}
  .score-max{font-size:15px;color:var(--ink-soft);}
  .verdict{font-size:13px;font-weight:600;padding:6px 13px;border-radius:999px;white-space:nowrap;}
  .v-good{color:var(--good);background:var(--good-bg);}
  .v-ok{color:var(--ok);background:var(--ok-bg);}
  .v-mid{color:var(--mid);background:var(--mid-bg);}
  .v-bad{color:var(--bad);background:var(--bad-bg);}
  .progress{height:5px;border-radius:999px;background:var(--track);margin-top:12px;overflow:hidden;}
  .progress > div{height:100%;border-radius:999px;background:var(--ink);transition:width .35s ease,background .35s;}

  /* ---------- items ---------- */
  main{padding:16px 14px 0;}
  .group-label{font-size:12px;font-weight:600;letter-spacing:.6px;color:var(--ink-soft);text-transform:uppercase;margin:18px 6px 8px;}
  .group-label:first-child{margin-top:2px;}
  .item{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px 16px;margin-bottom:10px;}
  .item-head{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .item-ic{font-size:18px;color:var(--ink-soft);width:20px;text-align:center;}
  .item-name{font-size:15px;font-weight:500;flex:1;}
  .item-val{font-family:var(--font-num);font-weight:500;font-size:15px;color:var(--ink-soft);}
  .seg{display:flex;gap:7px;flex-wrap:wrap;}
  .seg button{flex:1 1 auto;min-width:0;min-height:40px;padding:8px 6px;border-radius:11px;border:1px solid var(--line-strong);background:var(--chip);color:var(--chip-text);font-family:var(--font-ui);font-size:13.5px;font-weight:500;cursor:pointer;transition:background .14s,color .14s,border-color .14s,transform .1s;}
  .seg button:active{transform:scale(.96);}
  .seg button.on{background:var(--sel-bg);color:var(--sel-text);border-color:var(--sel-bg);}
  .slider-row{display:flex;align-items:center;gap:14px;}
  input[type=range]{-webkit-appearance:none;appearance:none;flex:1;height:5px;border-radius:999px;background:var(--track);outline:none;margin:8px 0;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:24px;height:24px;border-radius:50%;background:var(--ink);cursor:pointer;border:3px solid var(--card);box-shadow:0 1px 4px rgba(0,0,0,.22);}
  input[type=range]::-moz-range-thumb{width:24px;height:24px;border-radius:50%;background:var(--ink);cursor:pointer;border:3px solid var(--card);box-shadow:0 1px 4px rgba(0,0,0,.22);}
  .hint{font-size:11.5px;color:var(--ink-soft);margin-top:6px;}
  .note-input{width:100%;border:1px solid var(--line-strong);border-radius:11px;background:var(--chip);color:var(--ink);font-family:var(--font-ui);font-size:14px;line-height:1.55;padding:10px 12px;resize:vertical;min-height:72px;}
  .note-input:focus{outline:none;border-color:var(--ink-soft);background:var(--card);}
  .note-input::placeholder{color:var(--ink-soft);}

  /* ---------- settings modal ---------- */
  .overlay{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.45);display:none;align-items:flex-end;}
  .overlay.show{display:flex;}
  .sheet{width:100%;max-width:460px;margin:0 auto;background:var(--paper);border-radius:22px 22px 0 0;max-height:90vh;display:flex;flex-direction:column;animation:rise .26s ease;}
  @keyframes rise{from{transform:translateY(100%);}to{transform:translateY(0);}}
  .sheet-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 14px;border-bottom:1px solid var(--line);}
  .sheet-head h2{font-family:var(--font-num);font-weight:500;font-size:18px;margin:0;}
  .sheet-head p{font-size:12px;color:var(--ink-soft);margin:3px 0 0;}
  .done-btn{border:none;background:var(--ink);color:var(--sel-text);font-family:var(--font-ui);font-size:14px;font-weight:600;padding:8px 18px;border-radius:11px;cursor:pointer;}
  .done-btn:active{transform:scale(.96);}
  .sheet-body{overflow-y:auto;padding:8px 20px 4px;flex:1;-webkit-overflow-scrolling:touch;}
  .sec-label{font-size:12px;font-weight:600;letter-spacing:.5px;color:var(--ink-soft);text-transform:uppercase;margin:16px 0 2px;}
  .thresh-note{font-size:11.5px;color:var(--ink-soft);margin:2px 0 6px;}
  .wrow{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 0;border-bottom:1px solid var(--line);}
  .wrow:last-child{border-bottom:none;}
  .wrow .wn{font-size:14.5px;}
  .wrow .wn small{display:block;color:var(--ink-soft);font-size:11.5px;margin-top:2px;}
  .thr-side{display:flex;align-items:center;gap:8px;}
  .thr-ge{color:var(--ink-soft);font-size:14px;}
  .stepper{display:flex;align-items:center;border:1px solid var(--line-strong);border-radius:11px;overflow:hidden;}
  .stepper button{width:38px;height:38px;border:none;background:var(--card);color:var(--ink);font-size:20px;cursor:pointer;font-family:var(--font-ui);}
  .stepper button:active{background:var(--chip);}
  .stepper input{width:54px;height:38px;border:none;border-left:1px solid var(--line);border-right:1px solid var(--line);text-align:center;background:var(--card);color:var(--ink);font-family:var(--font-num);font-weight:500;font-size:15px;}
  .stepper input:focus{outline:none;}
  /* 重要度卡片 */
  .wcard{padding:13px 2px;border-bottom:1px solid var(--line);}
  .wcard:last-child{border-bottom:none;}
  .wcard-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:9px;}
  .wcard-top .wn{font-size:14.5px;}
  .wcard-top .wn small{display:block;color:var(--ink-soft);font-size:11px;margin-top:1px;}
  .imp-seg{display:flex;gap:5px;}
  .imp-seg button{flex:1;min-width:0;min-height:40px;padding:6px 2px;border-radius:9px;border:1px solid var(--line-strong);background:var(--chip);color:var(--chip-text);font-family:var(--font-ui);font-size:11px;font-weight:500;cursor:pointer;line-height:1.25;transition:background .12s,color .12s,border-color .12s;}
  .imp-seg button.on{background:var(--sel-bg);color:var(--sel-text);border-color:var(--sel-bg);}
  /* 货币 */
  .cur-seg{display:flex;gap:6px;margin:6px 0 2px;}
  .cur-seg button{flex:1;min-height:42px;border-radius:11px;border:1px solid var(--line-strong);background:var(--chip);color:var(--chip-text);font-family:var(--font-num);font-size:18px;font-weight:600;cursor:pointer;transition:background .12s,color .12s,border-color .12s;}
  .cur-seg button.on{background:var(--sel-bg);color:var(--sel-text);border-color:var(--sel-bg);}
  /* 自定义项目 */
  .cf{display:flex;flex-direction:column;gap:9px;margin:10px 0 4px;}
  .cf-name{width:100%;border:1px solid var(--line-strong);border-radius:10px;background:var(--chip);color:var(--ink);font-family:var(--font-ui);font-size:14px;padding:11px 12px;}
  .cf-name:focus{outline:none;border-color:var(--ink-soft);background:var(--card);}
  .cf-name::placeholder{color:var(--ink-soft);}
  .cf-row{display:flex;gap:8px;align-items:center;}
  .cf-type{display:flex;gap:6px;flex:1;}
  .cf-type button{flex:1;min-height:38px;border-radius:9px;border:1px solid var(--line-strong);background:var(--chip);color:var(--chip-text);font-family:var(--font-ui);font-size:13px;font-weight:500;cursor:pointer;}
  .cf-type button.on{background:var(--sel-bg);color:var(--sel-text);border-color:var(--sel-bg);}
  .cf select{height:38px;border-radius:9px;border:1px solid var(--line-strong);background:var(--card);color:var(--ink);font-family:var(--font-ui);font-size:13px;padding:0 8px;}
  .cf-add{height:38px;padding:0 16px;border-radius:9px;border:none;background:var(--ink);color:var(--sel-text);font-family:var(--font-ui);font-size:14px;font-weight:600;cursor:pointer;}
  .cf-add:active{transform:scale(.96);}
  .custom-item{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 2px;border-bottom:1px solid var(--line);}
  .custom-item:last-child{border-bottom:none;}
  .custom-item .ci-name{font-size:14px;}
  .custom-item .ci-name small{display:block;color:var(--ink-soft);font-size:11px;margin-top:1px;}
  .ci-del{width:34px;height:34px;border-radius:9px;border:1px solid var(--line-strong);background:transparent;color:var(--bad);font-size:18px;cursor:pointer;flex:none;}
  .ci-del:active{background:var(--chip);}
  .custom-empty{font-size:12.5px;color:var(--ink-soft);padding:6px 2px;}
  .sheet-foot{padding:14px 20px calc(16px + env(safe-area-inset-bottom));border-top:1px solid var(--line);}
  .reset-weights{width:100%;padding:13px;border-radius:13px;border:1px solid var(--line-strong);background:transparent;color:var(--ink-soft);font-family:var(--font-ui);font-size:14px;font-weight:500;cursor:pointer;}
  .reset-weights:active{background:var(--chip);}
  .total-line{text-align:center;font-size:12.5px;color:var(--ink-soft);margin-bottom:12px;}
  .total-line b{color:var(--ink);font-family:var(--font-num);}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="bar">
      <h1 id="title">房源评分</h1>
      <div class="tools">
        <div class="lang-seg">
          <button id="langZh">中</button>
          <button id="langJa">日</button>
          <button id="langEn">EN</button>
          <button id="langDe">DE</button>
        </div>
        <button class="icon-btn" id="copyBtn" aria-label="copy"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"></rect><path d="M5 15V5a2 2 0 0 1 2-2h10"></path></svg></button>
        <button class="icon-btn" id="resetBtn" aria-label="reset">&#8635;</button>
        <button class="icon-btn" id="settingsBtn" aria-label="settings">&#9881;</button>
      </div>
    </div>
    <div class="score-line">
      <div class="score-main">
        <span class="score-num" id="scoreNum">0</span>
        <span class="score-max" id="scoreMax">/ 0</span>
      </div>
      <span class="verdict v-bad" id="verdict">—</span>
    </div>
    <div class="progress"><div id="progressFill" style="width:0%"></div></div>
  </header>

  <main id="items">
    <div style="padding:26px 10px;color:var(--ink-soft);font-size:13.5px;line-height:1.75;">
      正在加载… 若此处持续空白，说明当前预览未运行脚本。请将文件保存后用 Safari 等浏览器打开。<br>
      読み込み中… ここが空白のままなら、スクリプトが動作していません。ファイルを保存して Safari などのブラウザで開いてください。
    </div>
  </main>
</div>

<!-- 设置面板 / 設定パネル -->
<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="sheet-head">
      <div>
        <h2 id="sheetTitle">设置</h2>
        <p id="sheetSub">修改后自动保存</p>
      </div>
      <button class="done-btn" id="doneBtn">完成</button>
    </div>
    <div class="sheet-body">
      <div class="sec-label" id="secCurrencyLabel">货币显示</div>
      <div class="cur-seg" id="currencySeg"></div>

      <div class="sec-label" id="secWeightsLabel">重要度</div>
      <div class="thresh-note" id="weightNote"></div>
      <div id="weightList"></div>

      <div class="sec-label" id="secRangesLabel">评分范围</div>
      <div class="thresh-note" id="rangeNote"></div>
      <div id="rangeList"></div>

      <div class="sec-label" id="secThreshLabel">评判阈值</div>
      <div class="thresh-note" id="threshNote"></div>
      <div id="threshList"></div>

      <div class="sec-label" id="secCustomLabel">自定义项目</div>
      <div class="thresh-note" id="customNote"></div>
      <div id="customList"></div>
      <div class="cf">
        <input class="cf-name" id="customName" placeholder="项目名称">
        <div class="cf-row">
          <div class="cf-type" id="customType">
            <button data-t="segment" id="ctBool" class="on">有/无</button>
            <button data-t="direct" id="ctRate">评分</button>
          </div>
          <select id="customImp"></select>
          <button class="cf-add" id="customAdd">添加</button>
        </div>
      </div>
    </div>
    <div class="sheet-foot">
      <div class="total-line"><span id="wsPre">当前满分合计</span> <b id="weightSum">0</b> <span id="wsSuf">分</span></div>
      <button class="reset-weights" id="resetAllBtn">恢复默认设置</button>
    </div>
  </div>
</div>

<script>
/* =========================================================================
   配置区 / 設定エリア
   添加新评分项：在 BASE_CONFIG 里加一个对象即可，界面自动生成。
   （也可在「设置 → 自定义项目」里由用户手动添加。）
   所有文案均为 {zh:'中文', ja:'日本語'} 双语对象；自定义项的名称为单一字符串。

   字段：id 唯一key / label 名称 / icon 图标 / group 分组id / weight 重要度 / default 默认状态
   类型 type：
     'segment' 按钮项 options:[{label,factor}]  得分 = factor(0~1) × 重要度
     'direct'  评分滑块 0~5(DIRECT_MAX)，得分 = (滑块值/5) × 重要度  (step 固定 0.5 / hint)
     'smooth'  平滑映射滑块 真实数值→0~1 因子，得分 = 因子 × 重要度
               (min/max/lowBound/highBound/step/unit/default; inverted=越小越好; currency=用货币符号)
     'note'    纯文本备注，不计分，内容会进入一键复制
   ★ 所有项目因子均为 0~1，无扣分项；重要度统一为 1/2/4/6/9（可 0.5 微调）。
   ========================================================================= */

const DIRECT_MAX = 5;          // 评分滑块上限
const DIRECT_STEP = 0.5;

// 重要度等级（同一等级 = 同一乘积，体现比重）
const IMPORTANCE = [
  {v:1, label:{zh:'可有可无', ja:'不問',     en:'Optional', de:'Egal'}},
  {v:2, label:{zh:'一般',     ja:'普通',     en:'Low',      de:'Gering'}},
  {v:4, label:{zh:'有点重要', ja:'やや重要', en:'Medium',   de:'Mittel'}},
  {v:6, label:{zh:'重要',     ja:'重要',     en:'Important', de:'Wichtig'}},
  {v:9, label:{zh:'非常重要', ja:'最重要',   en:'Critical', de:'Sehr wichtig'}},
];

const GROUPS = {
  core:    {zh:'核心指标',    ja:'コア項目',        en:'Core',         de:'Kernkriterien'},
  comfort: {zh:'生活舒适度',  ja:'暮らしの快適さ',  en:'Comfort',      de:'Wohnkomfort'},
  space:   {zh:'空间与工作',  ja:'空間と仕事',      en:'Space & Work', de:'Raum & Arbeit'},
  cost:    {zh:'经济与条件',  ja:'費用と条件',      en:'Cost & Terms', de:'Kosten & Konditionen'},
  custom:  {zh:'自定义',      ja:'カスタム',        en:'Custom',       de:'Eigene'},
  subj:    {zh:'主观',        ja:'主観',            en:'Subjective',   de:'Subjektiv'},
};
const GROUP_ORDER = ['core','comfort','space','cost','custom','subj'];

// 货币（仅切换显示符号，不做汇率换算）
const CURRENCIES = [
  {id:'EUR', sym:'€'},
  {id:'USD', sym:'$'},
  {id:'CNY', sym:'¥'},
];

const BASE_CONFIG = [
  // —— 核心指标（置顶）——
  { id:'area', label:{zh:'面积',ja:'広さ',en:'Area',de:'Fläche'}, icon:'⬚', group:'core', type:'smooth', weight:6,
    min:10, max:1000, lowBound:40, highBound:90, step:10, unit:'㎡', default:50 },
  { id:'rent', label:{zh:'月租金',ja:'月額家賃',en:'Rent',de:'Miete'}, icon:'◈', group:'core', type:'smooth', weight:6,
    min:0, max:10000000, lowBound:500, highBound:1200, inverted:true, step:10, stepped:true, currency:true, default:1000 },
  { id:'commute', label:{zh:'通勤时间',ja:'通勤時間',en:'Commute',de:'Arbeitsweg'}, icon:'➤', group:'core', type:'segment', weight:9, default:3,
    times:[10,15,20],
    options:[{factor:1},{factor:0.667},{factor:0.333},{factor:0}],
    optionLabel:(idx,times)=>{ const last=times[times.length-1];
      return idx<times.length
        ? {zh:'≤'+times[idx]+'分',ja:times[idx]+'分以内',en:'≤'+times[idx]+' min',de:'≤'+times[idx]+' Min.'}
        : {zh:'>'+last+'分',ja:last+'分超',en:'>'+last+' min',de:'>'+last+' Min.'}; } },
  { id:'env', label:{zh:'环境',ja:'環境',en:'Surroundings',de:'Umgebung'}, icon:'❡', group:'core', type:'direct', weight:6, default:0,
    hint:{zh:'0 差 — 5 好', ja:'0 悪い — 5 良い', en:'0 poor — 5 great', de:'0 schlecht — 5 top'} },

  // —— 生活舒适度 ——
  { id:'sunlight', label:{zh:'阳光光照',ja:'日当たり',en:'Sunlight',de:'Sonnenlicht'}, icon:'☀', group:'comfort', type:'direct', weight:2, default:0,
    hint:{zh:'0 阴暗 — 5 充足', ja:'0 暗い — 5 明るい', en:'0 dark — 5 bright', de:'0 dunkel — 5 hell'} },
  { id:'balcony', label:{zh:'阳台',ja:'バルコニー',en:'Balcony',de:'Balkon'}, icon:'❏', group:'comfort', type:'segment', weight:4, default:0,

const LS_WEIGHTS  = 'houseScoreWeights_v4';
const LS_THRESH   = 'houseScoreThresholds_v3';
const LS_PARAMS   = 'houseScoreParams_v3';
const LS_LANG     = 'houseScoreLang_v1';
const LS_CURRENCY = 'houseScoreCurrency_v1';
const LS_CUSTOM   = 'houseScoreCustom_v1';

const round1 = n => Math.round(n*10)/10;
const clamp = (n,a,b)=>Math.max(a,Math.min(b,n));
const byId = id => CONFIG.find(i=>i.id===id);

// 语言
let lang = 'zh';
try{ const sl = localStorage.getItem(LS_LANG); if(['zh','ja','en','de'].includes(sl)) lang = sl; }catch(e){}
function L(field){ if(field==null) return ''; if(typeof field==='string') return field; return field[lang] || field.zh || ''; }

// 货币
let currency = 'EUR';
try{ const sc = localStorage.getItem(LS_CURRENCY); if(CURRENCIES.some(c=>c.id===sc)) currency = sc; }catch(e){}
function curSym(){ const c = CURRENCIES.find(x=>x.id===currency); return c ? c.sym : '€'; }
function unitOf(it){ return it.currency ? curSym() : (it.unit||''); }
function minUnit(){ return lang==='en' ? 'min' : lang==='de' ? 'Min.' : '分'; }
// 金额分段步进：量级越大步长越大
function moneyStep(v){
  v = Math.abs(v);
  if(v<1000)    return 10;
  if(v<5000)    return 100;
  if(v<10000)   return 500;
  if(v<100000)  return 1000;
  if(v<1000000) return 10000;
  return 100000;
}
// ≥10000 显示为 xK
function fmtAmount(v){ return v>=10000 ? round1(v/1000)+'K' : ''+v; }
function parseAmount(s){
  s = (''+s).trim().toUpperCase();
  const k = s.endsWith('K');
  const n = parseFloat(s);
  if(isNaN(n)) return NaN;
  return k ? n*1000 : n;
}
// 为大范围滑块生成分段刻度数组（索引模式）
let RENT_STOPS = null;
function moneyStops(it){
  if(it.id==='rent' && RENT_STOPS) return RENT_STOPS;
  const arr=[it.min]; let v=it.min, g=0;
  while(v<it.max && g++<200000){ v=Math.round(v+moneyStep(v)); if(v>it.max) v=it.max; arr.push(v); }
  if(it.id==='rent') RENT_STOPS=arr;
  return arr;
}
function nearestStopIdx(stops, val){
  if(val<=stops[0]) return 0;
  if(val>=stops[stops.length-1]) return stops.length-1;
  let best=0, bd=Infinity;
  for(let i=0;i<stops.length;i++){ const d=Math.abs(stops[i]-val); if(d<bd){bd=d;best=i;} }
  return best;
}

// 自定义项目
function buildCustomItem(c){
  if(c.type==='direct'){
    return { id:c.id, label:c.label, icon:'•', group:'custom', type:'direct', weight:c.weight, default:0,
      hint:{zh:'0 低 — 5 高', ja:'0 低い — 5 高い'} };
  }
  return { id:c.id, label:c.label, icon:'•', group:'custom', type:'segment', weight:c.weight, default:0,
    options:[{label:{zh:'无',ja:'なし'},factor:0},{label:{zh:'有',ja:'あり'},factor:1}] };
}
let customItems = [];
try{
  const s = JSON.parse(localStorage.getItem(LS_CUSTOM) || '[]');
  if(Array.isArray(s)) customItems = s.filter(c=>c && c.id && c.label && (c.type==='direct'||c.type==='segment'))
    .map(c=>({ id:String(c.id), label:String(c.label), type:c.type, weight:(typeof c.weight==='number'?c.weight:2) }));
}catch(e){}
function persistCustom(){ try{ localStorage.setItem(LS_CUSTOM, JSON.stringify(customItems)); }catch(e){} }

// CONFIG = 基础项 + 自定义项
let CONFIG = [];
function rebuildConfig(){ CONFIG = BASE_CONFIG.concat(customItems.map(buildCustomItem)); }
rebuildConfig();

// 重要度（权重）
function defaultWeights(){ const w={}; CONFIG.forEach(i=>{ if(i.weight!=null) w[i.id]=i.weight; }); return w; }
let weights = defaultWeights();
try{
  const saved = JSON.parse(localStorage.getItem(LS_WEIGHTS) || '{}');
  CONFIG.forEach(i=>{ if(typeof saved[i.id]==='number') weights[i.id]=saved[i.id]; });
}catch(e){}
function persistWeights(){ try{ localStorage.setItem(LS_WEIGHTS, JSON.stringify(weights)); }catch(e){} }

// 阈值
let thresholds = {...DEFAULT_THRESHOLDS};
try{
  const s = JSON.parse(localStorage.getItem(LS_THRESH) || '{}');
  ['good','ok','mid'].forEach(k=>{ if(typeof s[k]==='number') thresholds[k]=s[k]; });
}catch(e){}
function normalizeThresholds(){
  const r=v=>clamp(Math.round(v*2)/2,0,10);
  thresholds.mid = r(thresholds.mid);
  thresholds.ok  = Math.max(thresholds.mid, r(thresholds.ok));
  thresholds.good= Math.max(thresholds.ok, r(thresholds.good));
}
normalizeThresholds();
function persistThresholds(){ try{ localStorage.setItem(LS_THRESH, JSON.stringify(thresholds)); }catch(e){} }

// 可配置评分参数（smooth 范围 + 通勤档位）
function defaultParams(){
  return {
    area:    { low:byId('area').lowBound, high:byId('area').highBound },
    rent:    { low:byId('rent').lowBound, high:byId('rent').highBound },
    nach:    { low:byId('nach').lowBound, high:byId('nach').highBound },
    commute: { times:[...byId('commute').times] },
  };
}
let params = defaultParams();
try{
  const s = JSON.parse(localStorage.getItem(LS_PARAMS) || '{}');
  if(s.area && typeof s.area.low==='number' && typeof s.area.high==='number') params.area = {low:s.area.low, high:s.area.high};
  if(s.rent && typeof s.rent.low==='number' && typeof s.rent.high==='number') params.rent = {low:s.rent.low, high:s.rent.high};
  if(s.nach && typeof s.nach.low==='number' && typeof s.nach.high==='number') params.nach = {low:s.nach.low, high:s.nach.high};
  if(s.commute && Array.isArray(s.commute.times)) params.commute = {times:s.commute.times.slice(0,3)};
}catch(e){}
function normRange(key){
  const it = byId(key);
  params[key].low  = clamp(Math.round(params[key].low),  it.min, it.max);
  params[key].high = clamp(Math.round(params[key].high), it.min, it.max);
  if(params[key].high <= params[key].low) params[key].high = Math.min(it.max, params[key].low + it.step);
}
function normalizeParams(){
  normRange('area'); normRange('rent'); normRange('nach');
  let t = params.commute.times.map(x=>Math.max(1, Math.round(x)));
  while(t.length<3) t.push((t[t.length-1]||0)+1);
  if(t[1]<=t[0]) t[1]=t[0]+1;
  if(t[2]<=t[1]) t[2]=t[1]+1;
  params.commute.times = t.slice(0,3);
}
normalizeParams();
function persistParams(){ try{ localStorage.setItem(LS_PARAMS, JSON.stringify(params)); }catch(e){} }

function getRange(it){
  const p = params[it.id];
  if(p && typeof p.low==='number') return {low:p.low, high:p.high};
  return {low:it.lowBound, high:it.highBound};
}
function currentTimes(it){
  const p = params[it.id];
  return (p && Array.isArray(p.times)) ? p.times : it.times;
}
function getOptionLabel(it, idx){
  if(it.optionLabel) return it.optionLabel(idx, currentTimes(it));
  return it.options[idx].label;
}

// 本次输入状态（不持久化）
function defaultState(){ const s={}; CONFIG.forEach(i=>s[i.id]=i.default); return s; }
let state = defaultState();

// 新增/删除自定义项后同步 CONFIG / weights / state
function syncCustom(){
  rebuildConfig();
  CONFIG.forEach(it=>{
    if(it.weight!=null && weights[it.id]==null) weights[it.id]=it.weight;
    if(state[it.id]==null) state[it.id]=it.default;
  });
}

/* ---------- 计分 ---------- */
function factorOf(it){
  const v = state[it.id];
  if(it.type==='segment') return it.options[v] ? it.options[v].factor : 0;
  if(it.type==='direct')  return clamp(v,0,DIRECT_MAX)/DIRECT_MAX;
  if(it.type==='smooth'){
    const r = getRange(it);
    let f = it.inverted ? (r.high - v)/(r.high - r.low)
                        : (v - r.low)/(r.high - r.low);
    return clamp(f,0,1);
  }
  return 0;
}
function itemScore(it){
  if(it.type==='note') return 0;
  return factorOf(it) * (weights[it.id]||0);
}
function itemMax(it){
  if(it.type==='note') return 0;
  const w = weights[it.id]||0;
  if(it.type==='segment') return Math.max(0, ...it.options.map(o=>o.factor)) * w;
  return w;
}
function totalMax(){ return CONFIG.reduce((s,it)=>s+itemMax(it),0); }
function total(){ return CONFIG.reduce((s,it)=>s+itemScore(it),0); }

function displayVal(it){
  const v = state[it.id];
  if(it.type==='direct') return round1(v) + ' / ' + DIRECT_MAX;
  if(it.type==='smooth') { const u=unitOf(it); const num=it.currency?fmtAmount(v):v; return num + (u?(' '+u):''); }
  return '';
}
function describeValue(it){
  const v = state[it.id];
  if(it.type==='segment') return L(getOptionLabel(it, v));
  if(it.type==='smooth')  { const u=unitOf(it); const num=it.currency?fmtAmount(v):v; return num + (u?(' '+u):''); }
  if(it.type==='direct')  return round1(v) + ' / ' + DIRECT_MAX;
  if(it.type==='note')    return (v||'').trim();
  return '';
}

/* ---------- 渲染主体 ---------- */
const itemsEl = document.getElementById('items');
function renderBody(){
  itemsEl.innerHTML = '';
  GROUP_ORDER.forEach(g=>{
    const items = CONFIG.filter(it=>it.group===g);
    if(items.length===0) return;
    const gl = document.createElement('div');
    gl.className = 'group-label';
    gl.textContent = L(GROUPS[g]);
    itemsEl.appendChild(gl);

    items.forEach(it=>{
      const card = document.createElement('div');
      card.className = 'item';

      const head = document.createElement('div');
      head.className = 'item-head';
      head.innerHTML = `<span class="item-ic">${it.icon||''}</span><span class="item-name"></span>`;
      head.querySelector('.item-name').textContent = L(it.label);
      const valSpan = document.createElement('span');
      valSpan.className = 'item-val';
      valSpan.id = `val-${it.id}`;
      if(it.type==='direct'||it.type==='smooth') valSpan.textContent = displayVal(it);
      head.appendChild(valSpan);
      card.appendChild(head);

      if(it.type==='segment'){
        const seg = document.createElement('div');
        seg.className = 'seg';
        it.options.forEach((o,idx)=>{
          const b = document.createElement('button');
          b.textContent = L(getOptionLabel(it,idx));
          if(state[it.id]===idx) b.classList.add('on');
          b.onclick = ()=>{
            state[it.id]=idx;
            seg.querySelectorAll('button').forEach(x=>x.classList.remove('on'));
            b.classList.add('on');
            updateTotal();
          };
          seg.appendChild(b);
        });
        card.appendChild(seg);
      } else if(it.type==='note'){
        const ta = document.createElement('textarea');
        ta.className = 'note-input';
        ta.placeholder = L(it.placeholder);
        ta.value = state[it.id] || '';
        ta.rows = 3;
        ta.oninput = ()=>{ state[it.id] = ta.value; };
        card.appendChild(ta);
      } else {
        const row = document.createElement('div');
        row.className = 'slider-row';
        const range = document.createElement('input');
        range.type = 'range';
        const applySlider = ()=>{
          document.getElementById(`val-${it.id}`).textContent = displayVal(it);
          updateTotal();
        };
        if(it.type==='direct'){
          range.min=0; range.max=DIRECT_MAX; range.step=DIRECT_STEP;
          range.value = state[it.id];
          range.oninput = ()=>{ state[it.id] = parseFloat(range.value); applySlider(); };
        } else if(it.stepped){
          const stops = moneyStops(it);
          range.min=0; range.max=stops.length-1; range.step=1;
          range.value = nearestStopIdx(stops, state[it.id]);
          range.oninput = ()=>{ state[it.id] = stops[parseInt(range.value,10)]; applySlider(); };
        } else {
          range.min=it.min; range.max=it.max; range.step=it.step;
          range.value = state[it.id];
          range.oninput = ()=>{ state[it.id] = parseFloat(range.value); applySlider(); };
        }
        row.appendChild(range);
        card.appendChild(row);
        if(it.hint){
          const h = document.createElement('div');
          h.className='hint'; h.textContent=L(it.hint);
          card.appendChild(h);
        }
      }
      itemsEl.appendChild(card);
    });
  });
}

/* ---------- 顶部总分 ---------- */
const scoreNumEl = document.getElementById('scoreNum');
const scoreMaxEl = document.getElementById('scoreMax');
const verdictEl  = document.getElementById('verdict');
const progressEl = document.getElementById('progressFill');

function score10(){ const t=total(), m=totalMax(); return m>0 ? clamp(t,0,m)/m*10 : 0; }
function verdictOf(s){
  if(s>=thresholds.good) return {cls:'v-good', label:L(UI.verdictGood)};
  if(s>=thresholds.ok)   return {cls:'v-ok',   label:L(UI.verdictOk)};
  if(s>=thresholds.mid)  return {cls:'v-mid',  label:L(UI.verdictMid)};
  return {cls:'v-bad', label:L(UI.verdictBad)};
}
function updateTotal(){
  const s = score10();
  scoreNumEl.textContent = s.toFixed(1);
  scoreMaxEl.textContent = '/ 10';
  progressEl.style.width = (s*10) + '%';
  const vd = verdictOf(s);
  verdictEl.className = 'verdict ' + vd.cls;
  verdictEl.textContent = vd.label;
  const key = (vd.cls==='v-good')?'--good':(vd.cls==='v-ok')?'--ok':(vd.cls==='v-mid')?'--mid':'--bad';
  progressEl.style.background = getComputedStyle(document.documentElement).getPropertyValue(key).trim() || 'var(--ink)';
}

/* ---------- 重置本次输入 ---------- */
document.getElementById('resetBtn').onclick = ()=>{
  if(confirm(L(UI.confirmReset))){
    state = defaultState();
    renderBody(); updateTotal();
    window.scrollTo({top:0,behavior:'smooth'});
  }
};

/* ---------- 复制评估描述 ---------- */
const copyBtn = document.getElementById('copyBtn');
const COPY_ICON = copyBtn.innerHTML;
const CHECK_ICON = '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';

function buildDescription(){
  const s = score10();
  const cjk = (lang==='zh'||lang==='ja');
  const gO = cjk?'【':'[', gC = cjk?'】':']', sep = cjk?'：':': ';
  const lines = [ L(UI.title)+' '+s.toFixed(1)+'/10 · '+verdictOf(s).label, '' ];
  GROUP_ORDER.forEach(g=>{
    const items = CONFIG.filter(it=>it.group===g);
    if(items.length===0) return;
    const printed = [];
    items.forEach(it=>{
      if(it.type==='note'){ const t=describeValue(it); if(t) printed.push('· '+L(it.label)+sep+t); return; }
      printed.push('· '+L(it.label)+sep+describeValue(it));
    });
    if(printed.length){ lines.push(gO+L(GROUPS[g])+gC); printed.forEach(p=>lines.push(p)); }
  });
  return lines.join('\n');
}
function flashCopied(){
  copyBtn.innerHTML = CHECK_ICON;
  setTimeout(()=>{ copyBtn.innerHTML = COPY_ICON; }, 1200);
}
async function doCopy(){
  const text = buildDescription();
  try{
    if(navigator.clipboard && navigator.clipboard.writeText){ await navigator.clipboard.writeText(text); }
    else { throw 0; }
    flashCopied();
  }catch(e){
    try{
      const ta=document.createElement('textarea');
      ta.value=text; ta.style.position='fixed'; ta.style.top='0'; ta.style.opacity='0';
      document.body.appendChild(ta); ta.focus(); ta.select();
      ta.setSelectionRange(0, text.length);
      document.execCommand('copy');
      document.body.removeChild(ta);
      flashCopied();
    }catch(e2){ alert(text); }
  }
}
copyBtn.onclick = doCopy;

/* ---------- 设置面板 ---------- */
const overlay = document.getElementById('overlay');
const currencySeg = document.getElementById('currencySeg');
const weightList = document.getElementById('weightList');
const rangeList = document.getElementById('rangeList');
const threshList = document.getElementById('threshList');
const customList = document.getElementById('customList');
const weightSumEl = document.getElementById('weightSum');
const customNameInp = document.getElementById('customName');
const customImpSel = document.getElementById('customImp');

function setMaxUI(){ weightSumEl.textContent = round1(totalMax()); }
function impName(v){ const m=IMPORTANCE.find(x=>x.v===v); return m?L(m.label):round1(v)+''; }

function makeStepper(getVal, onApply, step, fmt, parse){
  const stepOf = (typeof step==='function') ? step : (()=>step||0.5);
  const show = fmt || (v=>round1(v));
  const read = parse || (s=>parseFloat(s));
  const stepper = document.createElement('div'); stepper.className='stepper';
  const minus = document.createElement('button'); minus.textContent='–';
  const inp = document.createElement('input'); inp.type='text'; inp.inputMode='decimal'; inp.value=show(getVal());
  const plus = document.createElement('button'); plus.textContent='+';
  const commit = v=>{ onApply(v); inp.value=show(getVal()); };
  minus.onclick=()=>commit(getVal()-stepOf(getVal()));
  plus.onclick =()=>commit(getVal()+stepOf(getVal()));
  inp.onchange =()=>{ const n=read(inp.value); commit(isNaN(n)?getVal():n); };
  stepper.appendChild(minus); stepper.appendChild(inp); stepper.appendChild(plus);
  return stepper;
}

// 货币
function renderCurrency(){
  currencySeg.innerHTML='';
  CURRENCIES.forEach(c=>{
    const b=document.createElement('button'); b.textContent=c.sym;
    if(currency===c.id) b.classList.add('on');
    b.onclick=()=>setCurrency(c.id);
    currencySeg.appendChild(b);
  });
}
function setCurrency(id){
  currency=id;
  try{ localStorage.setItem(LS_CURRENCY,id); }catch(e){}
  renderCurrency(); renderRanges(); renderBody(); updateTotal();
}

// 重要度
function renderWeights(){
  weightList.innerHTML = '';
  CONFIG.forEach(it=>{
    if(it.weight==null || it.type==='note') return;
    const card = document.createElement('div'); card.className='wcard';
    const top = document.createElement('div'); top.className='wcard-top';
    const wn = document.createElement('div'); wn.className='wn';
    wn.innerHTML = `<span></span><small></small>`;
    wn.querySelector('span').textContent = L(it.label);
    wn.querySelector('small').textContent = L(GROUPS[it.group]);
    top.appendChild(wn);
    const stepper = makeStepper(
      ()=>weights[it.id],
      v=>{ weights[it.id]=Math.max(0, Math.round(v*2)/2); persistWeights(); setMaxUI(); updateTotal(); renderWeights(); },
      0.5
    );
    top.appendChild(stepper);
    card.appendChild(top);

    const seg = document.createElement('div'); seg.className='imp-seg';
    IMPORTANCE.forEach(lv=>{
      const b=document.createElement('button'); b.textContent=L(lv.label);
      if(weights[it.id]===lv.v) b.classList.add('on');
      b.onclick=()=>{ weights[it.id]=lv.v; persistWeights(); setMaxUI(); updateTotal(); renderWeights(); };
      seg.appendChild(b);
    });
    card.appendChild(seg);
    weightList.appendChild(card);
  });
}

// 评分范围
function rangeRow(labelText, getVal, onApply, step, unit, fmt, parse){
  const row = document.createElement('div'); row.className='wrow';
  const wn = document.createElement('div'); wn.className='wn'; wn.textContent=labelText;
  row.appendChild(wn);
  const side = document.createElement('div'); side.className='thr-side';
  side.appendChild(makeStepper(getVal, onApply, step, fmt, parse));
  if(unit){ const u=document.createElement('span'); u.className='thr-ge'; u.textContent=unit; side.appendChild(u); }
  row.appendChild(side);
  return row;
}
function renderRanges(){
  rangeList.innerHTML='';
  const a=byId('area'), r=byId('rent'), n=byId('nach');
  const apply = ()=>{ normalizeParams(); persistParams(); renderRanges(); renderBody(); updateTotal(); };
  rangeList.appendChild(rangeRow(L(UI.rangeAreaLow),  ()=>params.area.low,  v=>{ params.area.low=v;  apply(); }, a.step, a.unit));
  rangeList.appendChild(rangeRow(L(UI.rangeAreaHigh), ()=>params.area.high, v=>{ params.area.high=v; apply(); }, a.step, a.unit));
  rangeList.appendChild(rangeRow(L(UI.rangeRentLow),  ()=>params.rent.low,  v=>{ params.rent.low=v;  apply(); }, moneyStep, unitOf(r), fmtAmount, parseAmount));
  rangeList.appendChild(rangeRow(L(UI.rangeRentHigh), ()=>params.rent.high, v=>{ params.rent.high=v; apply(); }, moneyStep, unitOf(r), fmtAmount, parseAmount));
  rangeList.appendChild(rangeRow(L(UI.rangeNachLow),  ()=>params.nach.low,  v=>{ params.nach.low=v;  apply(); }, n.step, unitOf(n)));
  rangeList.appendChild(rangeRow(L(UI.rangeNachHigh), ()=>params.nach.high, v=>{ params.nach.high=v; apply(); }, n.step, unitOf(n)));
  [0,1,2].forEach(i=>{
    rangeList.appendChild(rangeRow(
      L(UI.rangeCommutePre)+(i+1)+L(UI.rangeCommuteSuf),
      ()=>params.commute.times[i],
      v=>{ params.commute.times[i]=v; apply(); },
      1, minUnit()
    ));
  });
}

// 阈值
function renderThresholds(){
  threshList.innerHTML='';
  const defs = [
    {key:'good', label:UI.verdictGood},
    {key:'ok',   label:UI.verdictOk},
    {key:'mid',  label:UI.verdictMid},
  ];
  defs.forEach(d=>{
    const row=document.createElement('div'); row.className='wrow';
    const wn=document.createElement('div'); wn.className='wn'; wn.textContent=L(d.label);
    row.appendChild(wn);
    const side=document.createElement('div'); side.className='thr-side';
    const ge=document.createElement('span'); ge.className='thr-ge'; ge.textContent='≥';
    const stepper = makeStepper(
      ()=>thresholds[d.key],
      v=>{
        v = clamp(Math.round(v*2)/2, 0, 10);
        if(d.key==='good') thresholds.good = clamp(Math.max(v, thresholds.ok), 0, 10);
        else if(d.key==='ok') thresholds.ok = clamp(v, thresholds.mid, thresholds.good);
        else thresholds.mid = clamp(v, 0, thresholds.ok);
        persistThresholds(); updateTotal(); renderThresholds();
      },
      0.5
    );
    side.appendChild(ge); side.appendChild(stepper);
    row.appendChild(side);
    threshList.appendChild(row);
  });
}

// 自定义项目
let customType = 'segment';
function fillImpSelect(){
  const cur = customImpSel.value;
  customImpSel.innerHTML='';
  IMPORTANCE.forEach(lv=>{ const o=document.createElement('option'); o.value=lv.v; o.textContent=L(lv.label); customImpSel.appendChild(o); });
  customImpSel.value = cur || '2';
}
function renderCustom(){
  customList.innerHTML='';
  if(customItems.length===0){
    const e=document.createElement('div'); e.className='custom-empty'; e.textContent=L(UI.customEmpty);
    customList.appendChild(e); return;
  }
  customItems.forEach(c=>{
    const row=document.createElement('div'); row.className='custom-item';
    const nm=document.createElement('div'); nm.className='ci-name';
    nm.innerHTML='<span></span><small></small>';
    nm.querySelector('span').textContent=c.label;
    nm.querySelector('small').textContent=(c.type==='direct'?L(UI.customTypeRate):L(UI.customTypeBool))+' · '+impName(c.weight);
    row.appendChild(nm);
    const del=document.createElement('button'); del.className='ci-del'; del.textContent='×';
    del.onclick=()=>removeCustom(c.id);
    row.appendChild(del);
    customList.appendChild(row);
  });
}
function addCustom(){
  const name=customNameInp.value.trim();
  if(!name) return;
  const imp=parseFloat(customImpSel.value)||2;
  const id='c'+Date.now().toString(36);
  customItems.push({ id, label:name, type:customType, weight:imp });
  weights[id]=imp; state[id]=0;
  persistCustom(); syncCustom();
  customNameInp.value='';
  renderSettings(); renderBody(); updateTotal();
}
function removeCustom(id){
  customItems = customItems.filter(c=>c.id!==id);
  delete weights[id]; delete state[id];
  persistCustom(); syncCustom();
  renderSettings(); renderBody(); updateTotal();
}

function renderSettings(){ renderCurrency(); renderWeights(); renderRanges(); renderThresholds(); renderCustom(); setMaxUI(); }

document.getElementById('settingsBtn').onclick = ()=>{ renderSettings(); overlay.classList.add('show'); };
function closeSheet(){ overlay.classList.remove('show'); renderBody(); updateTotal(); }
document.getElementById('doneBtn').onclick = closeSheet;
overlay.onclick = e=>{ if(e.target===overlay) closeSheet(); };
document.getElementById('resetAllBtn').onclick = ()=>{
  if(confirm(L(UI.confirmResetAll))){
    weights = defaultWeights(); persistWeights();
    thresholds = {...DEFAULT_THRESHOLDS}; persistThresholds();
    params = defaultParams(); persistParams();
    renderSettings(); renderBody(); updateTotal();
  }
};

// 自定义表单交互
const ctBool = document.getElementById('ctBool');
const ctRate = document.getElementById('ctRate');
ctBool.onclick = ()=>{ customType='segment'; ctBool.classList.add('on'); ctRate.classList.remove('on'); };
ctRate.onclick = ()=>{ customType='direct';  ctRate.classList.add('on'); ctBool.classList.remove('on'); };

  document.getElementById('weightNote').textContent = L(UI.weightNote);

  document.getElementById('rangeNote').textContent = L(UI.rangeNote);

langZh.onclick = ()=>setLang('zh');
langJa.onclick = ()=>setLang('ja');
langEn.onclick = ()=>setLang('en');
langDe.onclick = ()=>setLang('de');

applyLang();
